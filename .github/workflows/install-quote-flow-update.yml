name: Install Quote Flow Update

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/install-quote-flow-update.yml"

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply quote flow files
        run: |
          cat > /tmp/quote-flow-update.tar.gz.b64 <<'ARCHIVE'
          
          ARCHIVE
          base64 --decode --ignore-garbage /tmp/quote-flow-update.tar.gz.b64 > /tmp/quote-flow-update.tar.gz
          tar -xzf /tmp/quote-flow-update.tar.gz
          rm -f .github/workflows/install-quote-flow-update.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/quote/gummies/page.tsx app/quote/tincture/page.tsx supabase/quote_requests.sql .github/workflows/install-quote-flow-update.yml
          git commit -m "Add quote request product metadata" || exit 0
          git push
