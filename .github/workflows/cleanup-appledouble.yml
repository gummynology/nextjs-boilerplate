name: Clean AppleDouble Files

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cleanup-appledouble.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove macOS AppleDouble files
        run: |
          find app/quote -name '._*' -type f -print -delete
          rm -f .github/workflows/cleanup-appledouble.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove AppleDouble helper files" || exit 0
          git push
