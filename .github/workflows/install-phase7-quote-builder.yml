name: Install Phase 7 Quote Builder

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/install-phase7-quote-builder.yml"

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Phase 7 files
        run: |
          cat > /tmp/phase7.tar.gz.b64 <<"EOF"

EOF
          base64 -d /tmp/phase7.tar.gz.b64 > /tmp/phase7.tar.gz
          tar -xzf /tmp/phase7.tar.gz
          rm -f .github/workflows/install-phase7-quote-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/activate/page.tsx app/quote supabase/quote_requests.sql .github/workflows/install-phase7-quote-builder.yml
          git commit -m "Add modular quote builder architecture" || exit 0
          git push
